name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: __AWS_REGION__
  AWS_ACCOUNT_ID: "__AWS_ACCOUNT_ID__"
  PROJECT_NAME: __PROJECT_NAME__
  APP_HOSTNAME: __APP_HOSTNAME__
  ECR_REPO: __PROJECT_NAME__
  ECS_CLUSTER: __PROJECT_NAME__
  ECS_SERVICE: __PROJECT_NAME__-api
  S3_BUCKET: __PROJECT_NAME__-frontend

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Validate
  # ---------------------------------------------------------------------------
  validate:
    runs-on:
      - codebuild-project-apex-2025-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.5'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::__AWS_ACCOUNT_ID__:role/GitHubActions-ApexResearchAgent
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init & Validate
        working-directory: infrastructure
        run: |
          terraform init
          terraform validate

      - name: Check for non-ASCII characters in Terraform
        run: |
          MATCHES=$(grep -rPn '[^\x00-\x7F]' infrastructure/ --include='*.tf' | grep -Pv ':\d+:\s*#' || true)
          if [ -n "$MATCHES" ]; then
            echo "ERROR: Non-ASCII characters found:"
            echo "$MATCHES"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Stage 2: Infrastructure (ensures ECR, ALB, ECS, CloudFront exist)
  # Runs on every deploy — idempotent, fast for existing infra (~30s)
  # ---------------------------------------------------------------------------
  deploy-infrastructure:
    needs: validate
    runs-on:
      - codebuild-project-apex-2025-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.5'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::__AWS_ACCOUNT_ID__:role/GitHubActions-ApexResearchAgent
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure
        run: |
          terraform apply -auto-approve \
            -var="backend_image=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:latest"

  # ---------------------------------------------------------------------------
  # Stage 3: Build and push backend Docker image (ECR guaranteed to exist)
  # ---------------------------------------------------------------------------
  build-backend:
    needs: deploy-infrastructure
    runs-on:
      - codebuild-project-apex-2025-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::__AWS_ACCOUNT_ID__:role/GitHubActions-ApexResearchAgent
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build --platform linux/amd64 \
            -f backend/Dockerfile \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:latest \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }} \
            backend/
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }} --all-tags

  # ---------------------------------------------------------------------------
  # Stage 4a: Deploy backend (force new ECS deployment)
  # ---------------------------------------------------------------------------
  deploy-backend:
    needs: [deploy-infrastructure, build-backend]
    runs-on:
      - codebuild-project-apex-2025-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::__AWS_ACCOUNT_ID__:role/GitHubActions-ApexResearchAgent
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

          echo "Waiting for ECS service to stabilize (up to 10 minutes)..."
          TIMEOUT=600
          ELAPSED=0
          INTERVAL=15
          while [ $ELAPSED -lt $TIMEOUT ]; do
            DEPLOY_STATUS=$(aws ecs describe-services \
              --cluster $ECS_CLUSTER \
              --services $ECS_SERVICE \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState' \
              --output text)
            echo "Primary deployment: $DEPLOY_STATUS (${ELAPSED}s)"
            if [ "$DEPLOY_STATUS" = "COMPLETED" ]; then
              echo "Service stabilized."
              break
            fi
            if [ "$DEPLOY_STATUS" = "FAILED" ]; then
              echo "Deployment failed."
              exit 1
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timed out after ${TIMEOUT}s."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Stage 4b: Build and deploy frontend to S3 + CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    needs: deploy-infrastructure
    runs-on:
      - codebuild-project-apex-2025-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::__AWS_ACCOUNT_ID__:role/GitHubActions-ApexResearchAgent
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          rm -f ~/.npmrc
          echo "registry=https://registry.npmjs.org/" > .npmrc
          cd frontend
          npm install --no-workspaces --registry=https://registry.npmjs.org

      - name: Setup Terraform (to read outputs)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.5'
          terraform_wrapper: false

      - name: Get Cognito Client ID from Terraform
        id: tf
        working-directory: infrastructure
        run: |
          terraform init -input=false
          COGNITO_CLIENT_ID=$(terraform output -raw cognito_client_id 2>/dev/null || echo "")
          echo "cognito_client_id=$COGNITO_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "Cognito Client ID: $COGNITO_CLIENT_ID"

      - name: Create frontend .env
        working-directory: frontend
        run: |
          cat > .env.production << EOF
          VITE_COGNITO_USER_POOL_ID=__COGNITO_POOL_ID__
          VITE_COGNITO_CLIENT_ID=${{ steps.tf.outputs.cognito_client_id }}
          VITE_COGNITO_DOMAIN=__COGNITO_DOMAIN__
          VITE_APP_HOSTNAME=__APP_HOSTNAME__
          VITE_APP_NAME=__APP_NAME__
          VITE_API_ENDPOINT=/api
          EOF

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        continue-on-error: true
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases != null && Aliases.Items != null && contains(Aliases.Items, '${{ env.APP_HOSTNAME }}')].Id | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ] && [ "$DIST_ID" != "null" ]; then
            aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
          else
            echo "CloudFront not ready - skipping invalidation"
          fi
